events { worker_connections 1024; }

http {
  upstream web     { server web:3000; }
  upstream signal  { server signal:3001; }
  upstream ai      { server ai-backend:8000; }

  server {
    listen 80;

    # Next.js frontend
    location / {
      proxy_pass         http://web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    # Signal server WebSocket
    location /socket.io/ {
      proxy_pass         http://signal;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    # AI backend WebSocket + REST
    location /ws/ {
      proxy_pass         http://ai;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    location /api/analytics/ {
      proxy_pass http://ai;
    }
  }
}