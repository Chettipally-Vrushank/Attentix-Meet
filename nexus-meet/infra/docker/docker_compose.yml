version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusmeet
      POSTGRES_PASSWORD: nexusmeet_dev
      POSTGRES_DB: nexusmeet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nexusmeet -d nexusmeet_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Signal Server ──────────────────────────────────────────
  signal:
    build:
      context: ../..
      dockerfile: apps/signal/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://nexusmeet:nexusmeet_dev@postgres:5432/nexusmeet_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change_me_use_env}
      SIGNAL_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  # ── AI Backend ─────────────────────────────────────────────
  ai-backend:
    build:
      context: ../../apps/ai-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nexusmeet:nexusmeet_dev@postgres:5432/nexusmeet_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      SIGNAL_SERVER_URL: http://signal:3001
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change_me_use_env}
      WHISPER_MODEL: tiny
      TOXICITY_MODEL: unitary/toxic-bert
      TOXICITY_THRESHOLD: "0.90"
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      # Cache HuggingFace + Whisper model downloads across restarts
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s # models take time to download on first run

  # ── Next.js Frontend ───────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SIGNAL_URL: http://localhost:3001
      NEXT_PUBLIC_AI_URL: ws://localhost:8000
      NEXT_PUBLIC_AI_URL_HTTP: http://localhost:8000
    depends_on:
      - signal
      - ai-backend

  # ── Nginx reverse proxy (optional, for production) ─────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - signal
      - ai-backend
    profiles: [ "production" ] # only starts with: docker compose --profile production up

volumes:
  pgdata:
  model_cache:
